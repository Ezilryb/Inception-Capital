<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minecraft 1.0 — Étape 1C</title>

  <!-- Import map DOIT être avant tout script type="module" -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.176.0/build/three.module.js"
    }
  }
  </script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      overflow: hidden;
      font-family: 'Courier New', monospace;
    }

    #viewport {
      width: 100vw;
      height: 100vh;
      display: block;
      cursor: crosshair;
    }

    /* ── Overlay de démarrage ─────────────────────────────── */
    #splash {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.85);
      z-index: 100;
      gap: 16px;
    }
    #splash h1 {
      color: #fff;
      font-size: clamp(20px, 4vw, 36px);
      text-shadow: 3px 3px 0 #555;
      letter-spacing: 2px;
    }
    #splash .version {
      color: #aaa;
      font-size: 14px;
    }
    #splash .controls {
      color: #ccc;
      font-size: 13px;
      line-height: 2;
      text-align: center;
    }
    #splash .controls span {
      color: #ffd700;
      font-weight: bold;
    }
    #splash button {
      margin-top: 12px;
      padding: 12px 32px;
      background: #4a7c1f;
      border: 2px solid #73b32f;
      color: #fff;
      font-family: inherit;
      font-size: 16px;
      cursor: pointer;
      letter-spacing: 1px;
      transition: background 0.15s;
    }
    #splash button:hover { background: #5c9a27; }

    /* ── HUD debug ────────────────────────────────────────── */
    #hud {
      position: fixed;
      top: 10px;
      left: 10px;
      color: #fff;
      font-size: 12px;
      line-height: 1.7;
      text-shadow: 1px 1px 2px #000;
      pointer-events: none;
      z-index: 10;
    }

    /* ── Réticule ─────────────────────────────────────────── */
    #crosshair {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 10;
    }
    #crosshair::before,
    #crosshair::after {
      content: '';
      position: absolute;
      background: rgba(255,255,255,0.8);
    }
    #crosshair::before {
      width: 18px; height: 2px;
      top: -1px; left: -9px;
    }
    #crosshair::after {
      width: 2px; height: 18px;
      top: -9px; left: -1px;
    }

    /* ── Barre de chargement ──────────────────────────────── */
    #loading {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      color: #aaa;
      font-size: 12px;
      text-align: center;
      pointer-events: none;
      z-index: 10;
    }
    #loading-bar {
      width: 200px;
      height: 6px;
      background: #333;
      margin-top: 6px;
      position: relative;
    }
    #loading-fill {
      height: 100%;
      background: #4a7c1f;
      width: 0%;
      transition: width 0.2s;
    }

    /* ── Hint pointer lock ────────────────────────────────── */
    #hint {
      position: fixed;
      bottom: 10px;
      right: 10px;
      color: #888;
      font-size: 11px;
      pointer-events: none;
      z-index: 10;
    }
  </style>
</head>
<body>

<div id="viewport"></div>

<!-- Réticule -->
<div id="crosshair"></div>

<!-- HUD debug -->
<div id="hud">
  <div id="hud-pos">XYZ : —</div>
  <div id="hud-chunks">Chunks : —</div>
  <div id="hud-tris">Triangles : —</div>
  <div id="hud-calls">Draw calls : —</div>
</div>

<!-- Barre de chargement -->
<div id="loading">
  Génération du monde…
  <div id="loading-bar"><div id="loading-fill"></div></div>
</div>

<!-- Hint -->
<div id="hint">Clic → capturer la souris · ESC → relâcher</div>

<!-- Splash screen -->
<div id="splash">
  <h1>⛏ MINECRAFT 1.0</h1>
  <div class="version">Étape 1C — Moteur Voxel WebGL</div>
  <div class="controls">
    <span>WASD</span> ou <span>↑↓←→</span> Déplacement<br>
    <span>ESPACE</span> Monter &nbsp;·&nbsp; <span>CTRL</span> Descendre<br>
    <span>SHIFT</span> Sprint (×4)<br>
    <span>Souris</span> Regarder (clic pour capturer)<br>
  </div>
  <button id="btn-start">JOUER</button>
</div>

<script type="module">
// ─────────────────────────────────────────────────────────────
//  Bootstrap — import Three.js depuis CDN puis nos modules locaux
// ─────────────────────────────────────────────────────────────

// Three.js via import map (défini en bas de page)
import * as THREE from 'three';
import { Engine } from './core/Engine.js';

const container = document.getElementById('viewport');
const splash    = document.getElementById('splash');
const btnStart  = document.getElementById('btn-start');
const loading   = document.getElementById('loading');
const fill      = document.getElementById('loading-fill');

let engine;

// ── Init différé (après le clic) ──────────────────────────
btnStart.addEventListener('click', () => {
  splash.style.display = 'none';

  engine = new Engine({
    container,
    seed: (Math.random() * 0xFFFFFF) | 0,
    viewDistance: 6,
  });

  engine.start();

  // Simulation de la barre de chargement basée sur les chunks meshed
  const CHECK_INTERVAL = 200;
  const TARGET_CHUNKS  = 12; // nombre de chunks avant de masquer la barre
  const timer = setInterval(() => {
    const stats = engine.getStats();
    const pct   = Math.min(100, (stats.chunkCount / TARGET_CHUNKS) * 100);
    fill.style.width = pct + '%';
    if (pct >= 100) {
      clearInterval(timer);
      loading.style.opacity = '0';
      setTimeout(() => loading.style.display = 'none', 500);
    }
  }, CHECK_INTERVAL);

  // Mise à jour HUD
  setInterval(() => {
    if (!engine) return;
    const s = engine.getStats();
    document.getElementById('hud-pos').textContent    = `XYZ : ${s.pos}`;
    document.getElementById('hud-chunks').textContent = `Chunks : ${s.chunkCount}`;
    document.getElementById('hud-tris').textContent   = `Triangles : ${(s.triangles / 1000).toFixed(1)}k`;
    document.getElementById('hud-calls').textContent  = `Draw calls : ${s.drawCalls}`;
  }, 200);

  // Aide pointer lock
  document.addEventListener('pointerlockchange', () => {
    document.getElementById('hint').textContent =
      document.pointerLockElement === container
        ? 'ESC → relâcher la souris'
        : 'Clic → capturer la souris · ESC → relâcher';
  });
});
</script>


</body>
</html>
